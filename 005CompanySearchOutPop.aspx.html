<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Company Search</title>
    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/style.css">

    <link rel="stylesheet" href="assets/css/flatpickr.min.css">
    <script src="assets/js/flatpickr.js" defer></script>

    <style>
        .input-group-text {
            width: 80px;
        }
    </style>
</head>

<body>

    <div class="container-fluid banner">
        <a href="002MainMenu.aspx">
            <img src="assets/img/AMG.png" alt="AMG" id="banner_logo" title="Return to Main Menu">
        </a>
        <div id="banner_assetmanagementgroup">Asset Management Group</div>
    </div>

    <form name="companysearch" method="post" action="005CompanySearchOutPop.aspx">

        <div class="container col-lg-9 mt-5">

            <div class="card shadow">
                <div class="card-header text-center">
                    Company Search
                </div>
                <div class="card-body">

                    <div class="row">

                        <div class="col-lg-3">

                            <div class="input-group mb-3">
                                <span class="input-group-text">Name</span>
                                <input type="text" name="vName" id="vName" value="" class="form-control form-control-sm">
                            </div>

                        </div>

                        <div class="col-lg-3">
                        
                            <div class="input-group mb-3">
                                <span class="input-group-text">Coverage</span>
                                <input type="text" name="vCoverage" id="vCoverage" value="" class="form-control form-control-sm">
                            </div>
                        
                        </div>

                        <div class="col-lg-3">

                            <div class="input-group mb-3">
                                <span class="input-group-text">Town</span>
                                <input name="vTown" type="text" size="12" value="" class="form-control form-control-sm">
                            </div>

                        </div>

                        <div class="col-lg-3">

                            <div class="input-group mb-3">
                                <span class="input-group-text">Postcode</span>
                                <input name="vPostcode" type="text" size="12" value="" class="form-control form-control-sm">
                            </div>

                        </div>

                        <div class="col-lg-3">
                        
                            <div class="input-group mb-3">
                                <span class="input-group-text">Type</span>
                                <select name="vType" id="vType" class="form-select form-select-sm">
                                    <option value="" selected>Please select...</option>
                                    <option value="999">AMGM</option>
                                    <option value="21">Asset Manager</option>
                                    <option value="1">Client</option>
                                    <option value="20">Contractor</option>
                                    <option value="2">Estate Agent</option>
                                    <!-- LPA Receiver NEW ADDITION -->
                                    <option value="">LPA Receiver</option>
                                    <option value="3">Solicitor</option>
                                </select>
                            </div>
                        
                        </div>

                        <div class="col-lg-3">

                            <div class="input-group mb-3">
                                <span class="input-group-text">Trade &#47; Skill</span>
                                <select name="vTradeSelect" class="form-select form-select-sm">
                                    <option value="">Please select...</option>
                                    <option value="8">Builder</option>
                                    <option value="6">Dog Handler</option>
                                    <option value="4">Gardener</option>
                                    <option value="2">Locksmith</option>
                                    <option value="7">Pest Control</option>
                                    <option value="3">Plumber</option>
                                    <option value="1">Repossession</option>
                                    <option value="5">Shuttering</option>
                                    <option value="9">Specialist</option>
                                </select>
                            </div>

                        </div>

                        <div class="col-lg-3 offset-lg-3">
                            <button type="submit" class="btn btn-sm btn-primary submit-icon col-12 col-lg-12">Search</button>
                        </div>

                    </div>

                    <!-- RESULTS SECTION -->
                    <form name="companylist" action="005GroupDeactivate.aspx" method="POST">

                        <div class="row mt-3 mb-1">

                            <div class="col-12">

                                <p class="card-header text-center p-1 fs-13">Results</p>

                                <div class="table-responsive">

                                    <table class="table table-striped">
                                        <thead>
                                            <tr>
                                                <th width="25%">Name</th>
                                                <th width="15%">Address</th>
                                                <th width="10%">Town</th>
                                                <th width="8%">Postcode</th>
                                                <th width="9%">Phone</th>
                                                <th width="25%">Notes</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <tr>
                                                <td>
                                                    <a href="#" onclick="javascript:popprevious(9017648,'All In Maintenance Building &amp; Development');">
                                                        All In Maintenance Building &amp; Development
                                                    </a>
                                                </td>
                                                <td> 241 Bristol Avenue </td>
                                                <td>Blackpool</td>
                                                <td>
                                                    <nobr>FY2 0JG</nobr>
                                                </td>
                                                <td>
                                                    <nobr>01253 547155</nobr>
                                                </td>
                                                <td>
                                                    Formerly trading as All Star Roofing & Building Lt...
                                                </td>
                                            </tr>
                                        </tbody>
                                    </table>
                                
                                </div>

                            </div>

                            <div class="d-flex justify-content-center">
                                <a href="#" onclick="window.close();" class="btn btn-secondary back-icon col-3">Close</a>
                            </div>

                        </div>

                    </form>
                    <!-- RESULTS SECTION -->

                </div>

            </div>

        </div>

    </form>

    <script src="assets/js/bootstrap.bundle.min.js"></script>

</body>

</html>
