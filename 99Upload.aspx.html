<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AMG OPERA - File Upload</title>
    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/style.css">

    <link rel="stylesheet" href="assets/css/flatpickr.min.css">
    <script src="assets/js/flatpickr.js" defer></script>
</head>

<body>

    <div class="container-fluid banner">

        <a href="002MainMenu.aspx" id="banner_logo" class="">
            <img src="assets/img/AMG.png" alt="AMG" id="banner_logo" title="Return to Main Menu">
        </a>

        <div id="banner_assetmanagementgroup">Asset Management Group</div>

        <div id="banner_caseref_address">
            AMGM/[Case ID] - <strong> [Address] </strong>
        </div>

    </div>

    <div id="navlinks">
        <a href="99Comms.aspx" target="_blank">Comms</a>
        <a href="FaxOut.aspx" target="_blank">Direct Comms</a>
        <a href="010TalkSheetOut.aspx" target="_blank">Talk Sheet</a>
        <a href="006JobAudit.aspx" target="_blank">Audit</a>
        <a href="029InvoiceSummary.aspx" target="_blank">Invoice History</a>
    </div>

    <form name="form1" method="post" action="99FileUpload.aspx">

        <div class="container col-12 col-lg-7 col-xxl-4">

            <div class="card shadow">
                <div class="card-header text-center">
                    Upload File
                </div>
                <div class="card-body">

                    <p class="text-center bg-light py-2 border fw-bold">
                        Upload the file or edited letter you wish to send
                    </p>

                    <p>
                        <input name="file" type="file" class="form-control form-control-sm" size="50" required>
                    </p>

                    <div class="row d-flex justify-content-between">

                        <div class="col-5 col-lg-4">
                            <a href="#" onclick="window.close();" class="btn btn-sm btn-primary back-icon col-12">Close</a>
                        </div>

                        <div class="col-5 col-lg-4">
                            <button class="btn btn-sm btn-success submit-icon col-12">
                                Submit
                            </button>
                        </div>

                    </div>


                </div>

            </div>

        </div>

    </form>


    <script src="assets/js/bootstrap.bundle.min.js"></script>

</body>

</html>
