<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AMG OPERA - Pic Upload Size Error</title>
    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

    <div class="container-fluid banner position-relative text-white p-3">

        <a href="002MainMenu.aspx">
            <img src="assets/img/AMG.png" alt="AMG" id="banner_logo" title="Return to Main Menu">
        </a>

        <div id="banner_assetmanagementgroup">Asset Management Group</div>

    </div>

    <div class="container col-lg-4 mt-5">

        <div class="card shadow">
            <div class="card-header fw-bold text-center fs-5">
                <span class="text-danger">Max Upload Size Exceeded!</span>
            </div>
            <div class="card-body">

                <div class="text-center">

                    <p class="my-3 fw-bold text-danger fs-5">
                        MAXIMUM 2MB UPLOAD SIZE EXCEEDED!
                    </p>

                    <p class="fs-13">
                        Please click your browsers "back" to return to the upload screen and either load individually (i.e 2MB&nbsp;for each submit) or re-size the photos accordingly.
                    </p>

                </div>
            </div>
        </div>

    </div>

    <script src="assets/js/bootstrap.bundle.min.js"></script>

</body>

</html>
