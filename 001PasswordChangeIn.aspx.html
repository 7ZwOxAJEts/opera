<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AMG OPERA - Password Change Error!</title>
    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

    <div class="container-fluid banner position-relative text-white p-3">

        <a href="002MainMenu.aspx">
            <img src="assets/img/AMG.png" alt="AMG" id="banner_logo" title="Return to Main Menu">
        </a>

        <div id="banner_assetmanagementgroup">Asset Management Group</div>

    </div>

    <div class="container col-lg-4 mt-5">

    <form name="" action="001PasswordChangeIn.aspx" method="POST">

        <div class="card shadow">
            <div class="card-header fw-bold text-center fs-5">
                <span class="text-danger">
                    Password Change Error!
                </span>
            </div>
            <div class="card-body">

                <p class="bg-danger shadow text-white text-center fw-bold p-3 mb-4">
                    Your new password must be 12 or more characters long. Please try again.
                </p>

                <div class="row g-3 justify-content-center">

                    <div class="col-12">
                        <label for="vCurrentPassword" class="form-label">Existing Password</label>
                        <input type="password" id="vCurrentPassword" name="vCurrentPassword" class="form-control" required>
                    </div>

                    <div class="col-12">
                        <label for="vNewPassword1" class="form-label">New Password</label>
                        <input type="password" id="vNewPassword1" name="vNewPassword1" class="form-control" minlength="12" required>
                        <div class="form-text">Must be at least 12 characters.</div>
                    </div>

                    <div class="col-12">
                        <label for="vNewPassword2" class="form-label">Repeat New Password</label>
                        <input type="password" id="vNewPassword2" name="vNewPassword2" class="form-control" minlength="12" required>
                    </div>

                </div>

                <hr>

                <button type="submit" class="btn btn-primary submit-icon col-12">
                    SUBMIT
                </button>
              
            </div>

        </div>
    
    </form>

    </div>

    <script src="assets/js/bootstrap.bundle.min.js"></script>

</body>

</html>
