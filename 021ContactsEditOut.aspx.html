<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AMG OPERA - Contact Edit</title>
    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/style.css">

    <link rel="stylesheet" href="assets/css/flatpickr.min.css">
    <script src="assets/js/flatpickr.js" defer></script>
</head>

<body>

    <div class="container-fluid banner">
        <a href="002MainMenu.aspx">
            <img src="assets/img/AMG.png" alt="AMG" id="banner_logo" title="Return to Main Menu">
        </a>
        <div id="banner_assetmanagementgroup">Asset Management Group</div>
    </div>

    <form name="form1" method="post" action="021ContactsEditIn.aspx">

        <div class="container col-lg-4 mt-5">

            <div class="card shadow">
                <div class="card-header text-center">
                    Add or Edit Contact
                </div>
                <div class="card-body">

                    <div class="row gap-2">

                        <div class="col-lg-12 d-flex flex-column gap-2">

                            <div class="input-group">
                                <span class="input-group-text w-25">Name</span>
                                <input type="text" name="vName" value="" class="form-control form-control-sm">
                            </div>

                            <div class="input-group">
                                <span class="input-group-text w-25">Telephone</span>
                                <input type="text" name="vTel" value="" class="form-control form-control-sm">
                            </div>

                            <div class="input-group">
                                <span class="input-group-text w-25">Email</span>
                                <input type="text" name="vEmail" value="" class="form-control form-control-sm">
                            </div>

                            <div class="input-group">
                                <span class="input-group-text w-25">Position / Dept.</span>
                                <input type="text" name="vPosition" value="" class="form-control form-control-sm">
                            </div>

                            <hr class="my-2">

                            <div class="alert alert-danger d-flex align-items-center gap-3 py-2 mb-0">
                                <i class="bi bi-exclamation-triangle-fill"></i>
                                <div class="flex-grow-1 small">
                                    <strong>Remove Contact</strong> — checking this box will permanently remove this contact.
                                </div>
                                <input class="mt-0" type="checkbox" name="vDelete" value="checkbox">
                            </div>

                            <hr class="my-2">

                        </div>

                    </div>


                    <div class="row mt-3">

                        <div class="col-12 d-flex flex-column flex-md-row d-md-flex justify-content-md-between">
                            <a href="#" onclick="window.close();" class="btn btn-sm btn-secondary back-icon col-md-4">CLOSE</a>
                            <button type="submit" class="btn btn-sm btn-success submit-icon col-md-4">SUBMIT</button>
                        </div>

                    </div>

                </div>
            </div>
        </div>

    </form>

    <script src="assets/js/bootstrap.bundle.min.js"></script>

</body>

</html>
