<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AMG OPERA - Log Out</title>
    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

    <div class="container-fluid banner position-relative text-white p-3">

        <a href="002MainMenu.aspx">
            <img src="assets/img/AMG.png" alt="AMG" id="banner_logo" title="Return to Main Menu">
        </a>

        <div id="banner_assetmanagementgroup">Asset Management Group</div>

    </div>

    <div class="container mt-5">

        <div class="card shadow">
            <div class="card-header fw-bold text-center fs-5">
                Logging you out now
            </div>
            <div class="card-body">
                <div class="text-center">
                    <p class="fw-bold fs-4 p-3 mb-4">
                        <i class="bi bi-box-arrow-right" style="font-size: 3.5rem;"></i>
                        <br>
                        You have been logged out of AMG OPERA.
                    </p>
                    <p class="fs-6 text-muted mb-4">
                        Thank you for using AMG OPERA.
                        <br>
                        <br>
                        If you wish to log in again, please click below.
                    </p>
                    <p>
                        <a href="001logonout.aspx" class="btn btn-primary submit-icon col-12 col-lg-4">LOGIN AGAIN</a>
                    </p>
                </div>
            </div>
        </div>

    </div>

    <script src="assets/js/bootstrap.bundle.min.js"></script>

</body>

</html>
